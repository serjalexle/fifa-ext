<!doctype html>

    <title>FC Helper</title>
    <link rel="stylesheet" href="./styles/popup.css" />

  <body>
    <section class="fc-popup">
      <div class="fc-popup-brand">

      <p class="fc-popup-text">Extension is active.</p>

          href="https://www.ea.com/ea-sports-fc/ultimate-team/web-app/"

          rel="noopener noreferrer"
